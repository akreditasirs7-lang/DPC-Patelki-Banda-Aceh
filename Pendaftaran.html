<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pendaftaran PATELKI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-slate-50 font-[Inter]">

<div class="max-w-2xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6">
Form Update Data PATELKI Banda Aceh
</h1>

<form id="formPendaftaran" class="space-y-5">

<!-- Nama -->

<div>
<label class="font-semibold">Full Name</label>
<input id="nama" type="text" class="input" placeholder="Nama lengkap">
</div>

<!-- STR -->

<div>
<label class="font-semibold">STR Number</label>
<input id="str" type="text" class="input" placeholder="Nomor STR">
</div>

<!-- KTA -->

<div>
<label class="font-semibold">Nomor KTA</label>
<input id="kta" type="text" class="input" placeholder="Nomor KTA">
</div>

<!-- Tempat kerja -->

<div>
<label class="font-semibold">Place of Work</label>
<input id="tempatKerja" type="text" class="input" placeholder="Rumah sakit / lab">
</div>

<!-- Gaji -->

<div>
<label class="font-semibold">Nominal Gaji</label>

<select id="gaji" class="input">

<option value="">Pilih gaji</option>
<option>1.000.000 - 3.000.000</option>
<option>3.500.000 - 4.500.000</option>
<option>5.000.000 - 12.000.000</option>

</select>

</div>

<!-- Telepon -->

<div>
<label class="font-semibold">Phone</label>
<input id="phone" type="tel" class="input" placeholder="+62">
</div>

<!-- Email -->

<div>
<label class="font-semibold">Email</label>
<input id="email" type="email" class="input" placeholder="email@gmail.com">
</div>

<!-- Upload foto -->

<div>

<label class="font-semibold">Profile Photo</label>

<input id="foto" type="file" class="input">

<img id="previewFoto" class="mt-3 w-24 rounded hidden">

</div>

<button type="submit"
class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">

Submit Registration

</button>

</form>

</div>

<script src="js/app.js"></script>

</body>
</html>
