<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1142d4",
                        "background-light": "#f8f9fc",
                        "background-dark": "#0a0c14",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-2xl mx-auto shadow-sm">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between sticky top-0 z-50 border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Form Update Data PATELKI DPC Banda Aceh</h2>
</div>
<!-- Hero Image Area -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/20 @[480px]:rounded-lg min-h-[218px] relative" data-alt="Laboratory equipment and medical professionals working" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAowHAsaTVRqLZcweiyx3UCT5rlmIRKSImL6bZk1DanNELbNujB5Tt4EXhy-TlIHQo06XCcExALlcFz9rMrQHxOx9_9Oy7_4GLoncoYBrhUlY7-BSGjHfU5lTiG4euC1wKIVUVeHVib1xw1cr6EQc39pUXCg-KaSV1eCv5l8bLMtEo5p3E6TufzUKurd-4ZaW0-y-a49KQLk9Dd4AaMJb0QDpoQ7ggwiPjMYjtFphrhCZfHZOikSnB7USxZaXzdgTUsrKClhWaE91Qx");'>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="relative p-6">
<span class="inline-block px-3 py-1 bg-primary text-white text-xs font-bold rounded-full mb-2 uppercase tracking-wider">Official Membership</span>
<h1 class="text-white text-3xl font-bold">DPC Kota Banda Aceh</h1>
</div>
</div>
</div>
</div>
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-900 dark:text-slate-100 tracking-light text-2xl font-bold leading-tight text-left">Form Update Data PATELKI DPC Banda Aceh</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-1">Please complete the form below with your valid credentials to join our community.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5 px-4 py-4 pb-20">
<!-- Full Name -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Full Name</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="Enter your full name with titles" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">person</span>
</div>
</label>
<!-- STR Number -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">STR Number</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="Registration number (STR)" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">badge</span>
</div>
</label>
<!-- Nomor KTA -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Nomor KTA</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="Enter your KTA number" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">card_membership</span>
</div>
</label>
<!-- Place of Work -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Place of Work / Institute</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="Hospital, Lab, or Institution name" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">domain</span>
</div>
</label>
<!-- Nominal Gaji -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Nominal Gaji</p>
<div class="relative">
<select class="form-select flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all appearance-none">
<option disabled="" selected="" value="">Select salary range</option>
<option value="1.000.000 - 3.000.000">1.000.000 - 3.000.000</option>
<option value="3.500.000 - 4.500.000">3.500.000 - 4.500.000</option>
<option value="5.000.000 - 12.000.000">5.000.000 - 12.000.000</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">payments</span>
<span class="material-symbols-outlined absolute right-3 top-4 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
<!-- Phone Number -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Phone Number</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="+62 8xx xxxx xxxx" type="tel"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">call</span>
</div>
</label>
<!-- Email -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Email Address</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary p-[15px] pl-11 text-base font-normal transition-all" placeholder="yourname@example.com" type="email"/>
<span class="material-symbols-outlined absolute left-3 top-4 text-slate-400">mail</span>
</div>
</label>
<!-- Upload Photo -->
<div class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Profile Photo</p>
<div class="flex items-center justify-center w-full">
<label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg cursor-pointer bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" for="dropzone-file">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-primary text-3xl mb-2">cloud_upload</span>
<p class="mb-2 text-sm text-slate-600 dark:text-slate-400"><span class="font-semibold">Click to upload</span> or drag and drop</p>
<p class="text-xs text-slate-500 dark:text-slate-500">SVG, PNG, JPG (MAX. 2MB)</p>
</div>
<input class="hidden" id="dropzone-file" type="file"/>
</label>
</div>
</div>
<!-- Submit Button -->
<div class="mt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Submit Registration</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
</form>
<!-- Footer Space -->
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
